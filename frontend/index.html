<!DOCTYPE html>
<html>
<head>
    <title>Student Details</title>
</head>
<body>
    <h1>Student Info</h1>
    <p id="data"></p>

    <script>
        fetch("http://localhost:3000/student-details")
        .then(res => res.json())
        .then(data => {
            document.getElementById("data").innerHTML =
                `Name: ${data.name} <br>
                 Roll: ${data.roll} <br>
                 Register: ${data.register}`;
        });
    </script>
</body>
</html>
